<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/goit-js-hw-09/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback Form</title>
    <script type="module" crossorigin src="/goit-js-hw-09/2-form.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-js-hw-09/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-09/assets/styles-Dh_5KGYX.css">
  </head>
  <body class="form-page">
    <div class="form-wrapper">
      <h2>Feedback</h2>
      <form class="feedback-form" autocomplete="off">
        <div class="form-field">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="your@email.com"
          />
        </div>
        <div class="form-field">
          <label for="message">Message</label>
          <textarea
            id="message"
            name="message"
            placeholder="Write your message here..."
          ></textarea>
        </div>
        <button type="submit">Send</button>
      </form>
    </div>

  </body>
</html>
